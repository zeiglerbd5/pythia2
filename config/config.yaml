  pair_criteria:
    min_market_cap_usd: 100_000_000  # $100M
    max_market_cap_usd: 5_000_000_000  # $5B
    min_daily_volume_usd: 10_000_000  # $10M
    min_volatility: 0.02  # 2% daily volatility minimum

# Coinbase WebSocket configuration
websocket:
  endpoint: "wss://advanced-trade-ws.coinbase.com"
  channels:
    # NOTE: level2 disabled - Coinbase limits L2 streams to ~100 per session
    # Using ticker instead - it includes best_bid/best_ask without stream limits
    # - "level2"  # Order book snapshots - DISABLED due to stream limits
    - "ticker"  # Includes best_bid, best_ask, price, volume - for spread calculation
    - "market_trades"  # 250ms batched executions - sufficient for OHLCV & features
    - "heartbeats"  # Prevents 60-90s timeout on illiquid pairs

  # JWT token refresh (ES256)
  jwt_refresh_interval_seconds: 90  # Refresh every 90s (2min expiration)

  # Connection management
  reconnect_delay_seconds: 5
  max_reconnect_delay_seconds: 60
  reconnect_backoff_multiplier: 1.5

  # Message handling
  message_queue_size: 10000
  batch_insert_interval_seconds: 5

# Data storage configuration
database:
  path: "market_data.duckdb"  # Updated to match XGBoost training & spike detector

  # Retention policies
  retention:
    trades_days: 90
    orderbook_snapshots_days: 30
    ohlcv_days: 365
    features_days: 180

  # Batch writing
  batch_size: 1000
  batch_timeout_seconds: 5

# Feature engineering configuration
features:
  # Timeframes
  timeframes:
    primary: "5m"  # Primary analysis timeframe
    confirmation: "15m"  # Trend confirmation
    entry: "1m"  # Precise entry timing

  # Lookback windows (in bars)
  lookback:
    indicators: 100  # 8.3 hours on 5m (50-100 bars per guide)
    model_input: 60  # 5 hours for LSTM input (30-60 days converted to bars)
    prediction_horizon: 10  # 50 minutes ahead (5-15 bars per guide)

  # Order book configuration
  order_book:
    depth_levels: 5  # L=5 per guide
    snapshot_interval_seconds: 10
    imbalance_threshold: 0.3  # |ρ| > 0.3 signals directional pressure

  # Microstructure indicators
  microstructure:
    roll_window: 100  # 50-100 bars per guide
    vpin_window: 50
    vpin_threshold: 0.5  # > 0.5 indicates high informed trading

  # Volume indicators
  volume:
    spike_ratio_threshold: 2.0  # 2x average = anomaly
    spike_window: 20

  # Price indicators
  price:
    rsi_period: 14
    vwap_std_bands: [1, 2, 3]  # Standard deviation multiples
    vwap_deviation_threshold: 0.05  # 5% from VWAP (3-5% per guide)
    bollinger_period: 20
    bollinger_std: 2

  # Whale detection
  whale:
    size_multiplier: 10  # 10x average order size

# Signal generation configuration
signals:
  # Ensemble voting
  ensemble:
    min_agreement_threshold: 0.75  # 75% minimum (75-90% per guide)
    high_confidence_threshold: 0.90  # 90% for increased position size
    model_count: 5  # 3-5 models per guide

  # Confidence scoring
  confidence:
    min_score: 0.7  # 0.7-0.8 per guide
    target_precision: 0.90  # 90%+ precision target

  # Signal filtering
  filters:
    min_volume_usd: 10000  # Minimum trade volume
    require_timeframe_alignment: true  # 5m and 15m must align
    require_obv_confirmation: true
    require_vwap_validation: true

  # Expected signal rate
  target_signals_per_day: 3  # Target 2-4 per guide
  max_signals_per_day: 6  # Hard limit

# Risk management configuration
risk:
  # Position sizing
  position_sizing:
    method: "fixed_fractional"
    risk_per_trade_pct: 0.015  # 1.5% (1-2% per guide)
    min_position_size_usd: 100
    max_position_size_usd: 10000

  # Stop loss
  stop_loss:
    atr_multiplier: 2.5  # 2-3x ATR per guide
    use_exchange_stops: true
    use_local_stops: true

  # Portfolio limits
  portfolio:
    max_total_exposure_multiplier: 2.5  # 2-3x capital per guide
    max_correlated_exposure_pct: 0.30  # Max 30% in correlated assets
    max_single_pair_exposure_pct: 0.20  # Max 20% in one pair

  # Daily limits
  daily:
    max_loss_pct: 0.075  # 7.5% (5-10% per guide) - circuit breaker
    max_trades: 10
    max_consecutive_losses: 3  # Reduce size after 3 losses

  # Volatility adjustment
  volatility:
    enabled: true
    lookback_days: 14
    scale_inverse: true  # Reduce size in high volatility

# Execution configuration
execution:
  # Order types
  default_order_type: "limit"
  limit_order_offset_pct: 0.001  # 0.1% from market

  # Slippage and fees
  expected_slippage_pct: 0.001  # 0.1%
  maker_fee_pct: 0.0006  # Coinbase Advanced Trade maker fee
  taker_fee_pct: 0.001  # Coinbase Advanced Trade taker fee

  # Order management
  order_timeout_seconds: 30
  cancel_unfilled_after_seconds: 60
  position_reconciliation_interval_seconds: 60

# Monitoring and logging configuration
monitoring:
  # Logging
  log_level: "INFO"
  log_file: "logs/pythia.log"
  log_rotation: "1 day"
  log_retention: "30 days"
  structured_logging: true

  # Metrics
  metrics_enabled: true
  metrics_port: 9090  # Prometheus

  # Alerts
  alerts:
    telegram:
      enabled: false
      chat_id: ""
    email:
      enabled: false
      smtp_server: ""
      smtp_port: 587
      recipients: []

  # Alert triggers
  alert_triggers:
    circuit_breaker_activated: true
    daily_loss_threshold_pct: 0.05  # Alert at 5% loss
    api_error_count: 10  # Alert after 10 consecutive errors
    websocket_disconnection: true
    low_precision_threshold: 0.70  # Alert if precision drops below 70%

# Backtesting configuration
backtesting:
  enabled: true
  start_date: "2021-01-01"
  end_date: "2024-01-01"
  initial_capital: 10000
  commission_pct: 0.001
  slippage_pct: 0.001

# Model training configuration (high-level, details in model_config.yaml)
training:
  data_split:
    train_window_days: 45  # 30-60 days per guide
    validation_window_days: 10  # 7-14 days per guide
    test_window_days: 10
    roll_forward_days: 7  # Walk-forward every 7 days

  target:
    type: "local_extrema"  # Binary classification of 7-14 day extrema
    window_days: 10  # 7-14 day window per guide

  retraining:
    enabled: true
    interval_days: 7  # Retrain weekly
    min_samples: 1000  # Minimum samples before training

# News monitoring configuration
news_monitoring:
  enabled: true
  scan_interval: 30  # Seconds between scan cycles
  min_confidence: 0.5  # Minimum confidence for signal emission
  signal_cooldown: 1800  # Seconds before same symbol can trigger again

  # Source configuration
  sources:
    exchange_listings:
      enabled: true
      # RSS feeds for Coinbase/Binance announcements (no API key needed)

    whale_alert:
      enabled: true
      min_usd_value: 1000000  # $1M minimum transfer
      # API key from WHALE_ALERT_API_KEY env var (free tier: 10 req/min)

    twitter_rss:
      enabled: true
      # Uses Nitter RSS feeds (no API key needed)
      accounts:
        - CoinbaseAssets
        - binance
        - whale_alert

    reddit:
      enabled: true
      min_upvotes: 50  # Minimum upvotes for signal
      subreddits:
        - cryptocurrency
        - CryptoMarkets
        - altcoin
      # API credentials from REDDIT_CLIENT_ID and REDDIT_CLIENT_SECRET env vars

  # Event priority scoring (used in confidence calculation)
  event_priority:
    listing: 1.0
    delisting: 0.9
    whale_move: 0.9
    partnership: 0.7
    upgrade: 0.7
    airdrop: 0.6
    sentiment_spike: 0.5
    mention: 0.3

# System configuration
system:
  environment: "development"  # development, staging, production
  paper_trading: true  # Start with paper trading
  max_workers: 4  # Asyncio worker tasks
  enable_gpu: true  # Use MPS on Apple Silicon
